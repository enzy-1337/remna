services:
  caddy:
    image: caddy:2-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      WEB_ADMIN_DOMAIN: ${WEB_ADMIN_DOMAIN}
      WEB_ADMIN_EMAIL: ${WEB_ADMIN_EMAIL}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
