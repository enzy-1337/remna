x-tz-env: &tz-env
  TZ: ${TZ:-Europe/Moscow}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      <<: *tz-env
      POSTGRES_USER: vpnbot
      POSTGRES_PASSWORD: vpnbot
      POSTGRES_DB: vpnbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Пробрасываем на хост нестандартные порты, чтобы `bot` мог работать в `network_mode: host`.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpnbot -d vpnbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Однократно применяет Alembic (в т.ч. новые колонки) до старта ботов/API.
  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    environment:
      <<: *tz-env
      DATABASE_URL: postgresql+asyncpg://vpnbot:vpnbot@postgres:5432/vpnbot
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7-alpine
    environment:
      <<: *tz-env
    # Пробрасываем на хост нестандартный порт под `network_mode: host`.

  bot:
    build: .
    entrypoint: ["/app/scripts/bot-entrypoint.sh"]
    command: ["python", "-m", "bot.main"]
    env_file:
      - .env
    environment:
      <<: *tz-env
      DATABASE_URL: postgresql+asyncpg://vpnbot:vpnbot@postgres:5432/vpnbot
      REDIS_URL: redis://redis:6379/0
      BOT_PROXYCHAINS_ENABLED: ${BOT_PROXYCHAINS_ENABLED:-false}
      PROXYCHAINS_SOCKS5_HOST: ${PROXYCHAINS_SOCKS5_HOST:-host.docker.internal}
      PROXYCHAINS_SOCKS5_PORT: ${PROXYCHAINS_SOCKS5_PORT:-1080}
      PROXYCHAINS_PROXY_DNS: ${PROXYCHAINS_PROXY_DNS:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    build: .
    entrypoint: ["/app/scripts/bot-entrypoint.sh"]
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      <<: *tz-env
      DATABASE_URL: postgresql+asyncpg://vpnbot:vpnbot@postgres:5432/vpnbot
      REDIS_URL: redis://redis:6379/0
      BOT_PROXYCHAINS_ENABLED: ${BOT_PROXYCHAINS_ENABLED:-false}
      PROXYCHAINS_SOCKS5_HOST: ${PROXYCHAINS_SOCKS5_HOST:-host.docker.internal}
      PROXYCHAINS_SOCKS5_PORT: ${PROXYCHAINS_SOCKS5_PORT:-1080}
      PROXYCHAINS_PROXY_DNS: ${PROXYCHAINS_PROXY_DNS:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  tickets-bot:
    build: .
    entrypoint: ["/app/scripts/bot-entrypoint.sh"]
    command: ["python", "-m", "tickets.main"]
    env_file:
      - .env
    environment:
      <<: *tz-env
      DATABASE_URL: postgresql+asyncpg://vpnbot:vpnbot@postgres:5432/vpnbot
      REDIS_URL: redis://redis:6379/0
      TICKETS_BOT_TOKEN: ${TICKETS_BOT_TOKEN:-}
      SUPPORT_GROUP_ID: ${SUPPORT_GROUP_ID:-0}
      REMINDER_HOURS: ${REMINDER_HOURS:-6}
      AUTO_CLOSE_DAYS: ${AUTO_CLOSE_DAYS:-3}
      ADMIN_IDS: ${ADMIN_IDS:-}
      BOT_PROXYCHAINS_ENABLED: ${BOT_PROXYCHAINS_ENABLED:-false}
      PROXYCHAINS_SOCKS5_HOST: ${PROXYCHAINS_SOCKS5_HOST:-host.docker.internal}
      PROXYCHAINS_SOCKS5_PORT: ${PROXYCHAINS_SOCKS5_PORT:-1080}
      PROXYCHAINS_PROXY_DNS: ${PROXYCHAINS_PROXY_DNS:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  pgdata:
