services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vpnbot
      POSTGRES_PASSWORD: vpnbot
      POSTGRES_DB: vpnbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Пробрасываем на хост нестандартные порты, чтобы `bot` мог работать в `network_mode: host`.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpnbot -d vpnbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Пробрасываем на хост нестандартный порт под `network_mode: host`.

  bot:
    build: .
    command: ["python", "-m", "bot.main"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpnbot:vpnbot@postgres:5432/vpnbot
      REDIS_URL: redis://redis:6379/0
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  api:
    build: .
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpnbot:vpnbot@postgres:5432/vpnbot
      REDIS_URL: redis://redis:6379/0
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  tickets-bot:
    # В средах без доступа в интернет нельзя пересобирать образ:
    # tickets-bot должен использовать уже собранный локальный образ сервиса `bot`.
    # Если тег на сервере отличается — поменяем под ваш `docker images`.
    image: remna-bot-bot
    command: ["python", "-m", "tickets.main"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpnbot:vpnbot@postgres:5432/vpnbot
      REDIS_URL: redis://redis:6379/0
      SUPPORT_GROUP_ID: ${SUPPORT_GROUP_ID:-0}
      REMINDER_HOURS: ${REMINDER_HOURS:-6}
      AUTO_CLOSE_DAYS: ${AUTO_CLOSE_DAYS:-3}
      ADMIN_IDS: ${ADMIN_IDS:-}
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: "no"

volumes:
  pgdata:
