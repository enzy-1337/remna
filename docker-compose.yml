services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "25432:5432"
    environment:
      POSTGRES_USER: vpnbot
      POSTGRES_PASSWORD: vpnbot
      POSTGRES_DB: vpnbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Пробрасываем на хост нестандартные порты, чтобы `bot` мог работать в `network_mode: host`.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpnbot -d vpnbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "26379:6379"
    # Пробрасываем на хост нестандартный порт под `network_mode: host`.

  bot:
    build: .
    command: ["python", "-m", "bot.main"]
    env_file:
      - .env
    network_mode: host
    environment:
      DATABASE_URL: postgresql+asyncpg://vpnbot:vpnbot@127.0.0.1:25432/vpnbot
      REDIS_URL: redis://127.0.0.1:26379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  api:
    build: .
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpnbot:vpnbot@postgres:5432/vpnbot
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
