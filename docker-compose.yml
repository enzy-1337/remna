services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vpnbot
      POSTGRES_PASSWORD: vpnbot
      POSTGRES_DB: vpnbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Порты не пробрасываем на хост: иначе конфликт с локальным PostgreSQL (5432).
    # Бот и API ходят в БД по имени сервиса postgres внутри сети compose.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpnbot -d vpnbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Аналогично — без публикации 6379 на хост (часто занят локальным Redis).

  bot:
    build: .
    command: ["python", "-m", "bot.main"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpnbot:vpnbot@postgres:5432/vpnbot
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  api:
    build: .
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vpnbot:vpnbot@postgres:5432/vpnbot
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
